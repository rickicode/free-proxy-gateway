# Base config for Nikki (mixin)
# Fixed: ports, DNS, rules, proxy-groups, proxy-providers, adblock
# Proxy files: warp.yml (local) + free-proxies.yml (repo)

mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: warning
ipv6: false

proxies:
  - name: WAN2
    type: direct
    interface-name: eth1

dns:
  enable: true
  listen: :1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 223.5.5.5
    - 8.8.8.8
  nameserver:
    - https://223.5.5.5/dns-query
    - https://1.1.1.1/dns-query
  nameserver-policy:
    'geosite:private,cn': 223.5.5.5
    'geosite:geolocation-!cn': https://1.1.1.1/dns-query

proxy-providers:
  warp:
    type: file
    path: /etc/nikki/run/providers/warp.yml
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300
  free:
    type: file
    path: /etc/nikki/run/providers/free-proxies.yml
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

proxy-groups:

  # ── WAN ────────────────────────────────────────
  - name: WAN
    type: select
    proxies:
      - DIRECT
      - WAN2

  - name: WAN-AUTO
    type: load-balance
    proxies:
      - DIRECT
      - WAN2
    url: http://www.gstatic.com/generate_204
    interval: 300

  # ── GLOBAL ─────────────────────────────────────
  - name: GLOBAL
    type: select
    proxies:
      - DIRECT
      - WAN2
      - WAN-AUTO
      - PROXY-FREE
      - PROXY-ID
      - PROXY-SG
      - PROXY-US
      - PROXY-ASIA
      - PROXY-EU
      - PROXY-WARP

  # ── PROXY POOLS ────────────────────────────────
  - name: PROXY-FREE
    type: url-test
    use:
      - free
    filter: "(?!.*(?:PROXY-|WARP-))"
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: PROXY-ID
    type: url-test
    use:
      - free
    filter: "^🇮🇩"
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: PROXY-SG
    type: url-test
    use:
      - free
    filter: "^🇸🇬"
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: PROXY-US
    type: url-test
    use:
      - free
    filter: "^🇺🇸"
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: PROXY-ASIA
    type: url-test
    use:
      - free
    filter: "^(?:🇮🇩|🇸🇬|🇲🇾|🇹🇭|🇻🇳|🇵🇭|🇯🇵|🇰🇷|🇹🇼|🇭🇰|🇮🇳)"
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: PROXY-EU
    type: url-test
    use:
      - free
    filter: "^(?:🇩🇪|🇫🇷|🇳🇱|🇬🇧|🇸🇪|🇳🇴|🇫🇮|🇩🇰|🇵🇱|🇨🇿|🇦🇹|🇨🇭|🇧🇪|🇪🇸|🇵🇹|🇮🇹)"
    url: http://www.gstatic.com/generate_204
    interval: 300

  # ── WARP ───────────────────────────────────────
  - name: WARP-LB
    type: load-balance
    use:
      - warp
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: PROXY-WARP
    type: select
    use:
      - warp
    proxies:
      - WARP-LB
      - DIRECT

  # ── ADBLOCK ────────────────────────────────────
  - name: BLOCKED
    type: select
    proxies:
      - REJECT
      - DIRECT
      - WAN2
      - WAN-AUTO
      - GLOBAL
      - PROXY-FREE
      - PROXY-ID
      - PROXY-SG
      - PROXY-US
      - PROXY-ASIA
      - PROXY-EU
      - PROXY-WARP

  # ── SERVICE ────────────────────────────────────
  - name: GOOGLE
    type: select
    proxies:
      - DIRECT
      - WAN2
      - WAN-AUTO
      - GLOBAL
      - PROXY-FREE
      - PROXY-ID
      - PROXY-SG
      - PROXY-US
      - PROXY-ASIA
      - PROXY-EU
      - PROXY-WARP

  - name: AI
    type: select
    proxies:
      - DIRECT
      - WAN2
      - WAN-AUTO
      - GLOBAL
      - PROXY-FREE
      - PROXY-ID
      - PROXY-SG
      - PROXY-US
      - PROXY-ASIA
      - PROXY-EU
      - PROXY-WARP

  - name: CHECK-IP
    type: select
    proxies:
      - DIRECT
      - WAN2
      - WAN-AUTO
      - GLOBAL
      - PROXY-FREE
      - PROXY-ID
      - PROXY-SG
      - PROXY-US
      - PROXY-ASIA
      - PROXY-EU
      - PROXY-WARP

  - name: SOCIAL
    type: select
    proxies:
      - DIRECT
      - WAN2
      - WAN-AUTO
      - GLOBAL
      - PROXY-FREE
      - PROXY-ID
      - PROXY-SG
      - PROXY-US
      - PROXY-ASIA
      - PROXY-EU
      - PROXY-WARP

rule-providers:
  # Service rules (local)
  private:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/rickicode/free-proxy-singbox/refs/heads/main/openwrt/rules/private.txt"
    path: ./ruleset/private.txt
    interval: 86400
  google:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/rickicode/free-proxy-singbox/refs/heads/main/openwrt/rules/google.txt"
    path: ./ruleset/google.txt
    interval: 86400
  ai:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/rickicode/free-proxy-singbox/refs/heads/main/openwrt/rules/ai.txt"
    path: ./ruleset/ai.txt
    interval: 86400
  check-ip:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/rickicode/free-proxy-singbox/refs/heads/main/openwrt/rules/check-ip.txt"
    path: ./ruleset/check-ip.txt
    interval: 86400
  social:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/rickicode/free-proxy-singbox/refs/heads/main/openwrt/rules/social.txt"
    path: ./ruleset/social.txt
    interval: 86400

rules:
  # Adblock
  - GEOSITE,category-ads-all,BLOCKED

  # Private & CN
  - RULE-SET,private,DIRECT

  # Google
  - RULE-SET,google,GOOGLE

  # AI
  - RULE-SET,ai,AI

  # IP check
  - RULE-SET,check-ip,CHECK-IP

  # Social
  - RULE-SET,social,SOCIAL

  # Social
  - RULE-SET,social,SOCIAL

  # Catch-all
  - GEOSITE,github,PROXY-FREE
  - GEOSITE,netflix,PROXY-FREE
  - MATCH,GLOBAL

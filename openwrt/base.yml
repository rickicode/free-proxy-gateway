# Base config for Nikki (mixin)
# Fixed: ports, DNS, rules, proxy-groups, proxy-providers, adblock
# Proxy files: warp.yml (local) + free-proxies.yml (repo)

mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: warning
ipv6: false

proxies:
  - name: WAN2
    type: direct
    interface-name: eth1
  - name: REJECT
    type: reject

dns:
  enable: true
  listen: :1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 223.5.5.5
    - 8.8.8.8
  nameserver:
    - https://223.5.5.5/dns-query
    - https://1.1.1.1/dns-query
  nameserver-policy:
    'geosite:private,cn': 223.5.5.5
    'geosite:geolocation-!cn': https://1.1.1.1/dns-query

proxy-providers:
  warp:
    type: file
    path: /etc/nikki/run/providers/warp.yml
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300
  free:
    type: file
    path: /etc/nikki/run/providers/free-proxies.yml
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

proxy-groups:
  # Ad blocking
  - name: BLOCKED
    type: select
    proxies:
      - REJECT
      - DIRECT
      - GLOBAL
      - PROXY-FREE
      - PROXY-WARP

  # WAN selection
  - name: WAN
    type: select
    proxies:
      - DIRECT
      - WAN2
  - name: WAN-AUTO
    type: url-test
    proxies:
      - DIRECT
      - WAN2
    url: http://www.gstatic.com/generate_204
    interval: 300

  # Global catch-all
  - name: GLOBAL
    type: select
    proxies:
      - DIRECT
      - WAN2
      - PROXY-FREE
      - PROXY-WARP

  # Proxy sources
  - name: PROXY-FREE
    type: url-test
    use:
      - free
    filter: "(?!.*(?:PROXY-|WARP-))"
    url: http://www.gstatic.com/generate_204
    interval: 300
  - name: PROXY-ID
    type: url-test
    use:
      - free
    filter: "^馃嚠馃嚛"
    url: http://www.gstatic.com/generate_204
    interval: 300
  - name: PROXY-SG
    type: url-test
    use:
      - free
    filter: "^馃嚫馃嚞"
    url: http://www.gstatic.com/generate_204
    interval: 300
  - name: PROXY-US
    type: url-test
    use:
      - free
    filter: "^馃嚭馃嚫"
    url: http://www.gstatic.com/generate_204
    interval: 300
  - name: PROXY-ASIA
    type: url-test
    use:
      - free
    filter: "^(?:馃嚠馃嚛|馃嚫馃嚞|馃嚥馃嚲|馃嚬馃嚟|馃嚮馃嚦|馃嚨馃嚟|馃嚡馃嚨|馃嚢馃嚪|馃嚬馃嚰|馃嚟馃嚢|馃嚠馃嚦)"
    url: http://www.gstatic.com/generate_204
    interval: 300
  - name: PROXY-EU
    type: url-test
    use:
      - free
    filter: "^(?:馃嚛馃嚜|馃嚝馃嚪|馃嚦馃嚤|馃嚞馃嚙|馃嚫馃嚜|馃嚦馃嚧|馃嚝馃嚠|馃嚛馃嚢|馃嚨馃嚤|馃嚚馃嚳|馃嚘馃嚬|馃嚚馃嚟|馃嚙馃嚜|馃嚜馃嚫|馃嚨馃嚬|馃嚠馃嚬)"
    url: http://www.gstatic.com/generate_204
    interval: 300

  # WARP
  - name: WARP-LB
    type: load-balance
    use:
      - warp
    url: http://www.gstatic.com/generate_204
    interval: 300
  - name: PROXY-WARP
    type: select
    use:
      - warp
    proxies:
      - WARP-LB
      - DIRECT

  # Service groups (all include WAN options)
  - name: GOOGLE
    type: select
    proxies:
      - DIRECT
      - WAN2
      - GLOBAL
      - PROXY-FREE
      - PROXY-WARP
  - name: AI
    type: select
    proxies:
      - DIRECT
      - WAN2
      - GLOBAL
      - PROXY-FREE
      - PROXY-WARP
  - name: CHECK-IP
    type: select
    proxies:
      - DIRECT
      - WAN2
      - GLOBAL
      - PROXY-FREE
      - PROXY-WARP
  - name: SOCIAL
    type: select
    proxies:
      - DIRECT
      - WAN2
      - GLOBAL
      - PROXY-FREE
      - PROXY-WARP

rule-providers:
  oisd-big:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/sjhgvr/oisd/main/domainswild.txt"
    path: ./ruleset/oisd-big.txt
    interval: 86400
  oisd-lite:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/sjhgvr/oisd/main/domainswild-lite.txt"
    path: ./ruleset/oisd-lite.txt
    interval: 86400
  adguard:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/AdguardTeam/FiltersRegistry/master/filters/filter_15_DnsFilter/filter.txt"
    path: ./ruleset/adguard.txt
    interval: 86400


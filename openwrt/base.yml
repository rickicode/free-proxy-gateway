# Base config for Nikki (mixin)
# Fixed: ports, DNS, rules, proxy-groups, proxy-providers, adblock
# Proxy files: warp.yml (local) + free-proxies.yml (repo)

mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: warning
ipv6: false

proxies:
  - name: WAN2
    type: direct
    interface-name: eth1

# Public proxy inbound listeners
inbound:
  - name: PROXY-1010
    type: mixed
    port: 1010
    proxy: PROXY-1010
  - name: PROXY-1011
    type: mixed
    port: 1011
    proxy: PROXY-1011
  - name: PROXY-1012
    type: mixed
    port: 1012
    proxy: PROXY-1012
  - name: PROXY-1013
    type: mixed
    port: 1013
    proxy: PROXY-1013

dns:
  enable: true
  listen: :1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 223.5.5.5
    - 8.8.8.8
  nameserver:
    - https://223.5.5.5/dns-query
    - https://1.1.1.1/dns-query
  nameserver-policy:
    'geosite:private,cn': 223.5.5.5
    'geosite:geolocation-!cn': https://1.1.1.1/dns-query

proxy-providers:
  warp:
    type: file
    path: /etc/nikki/run/providers/warp.yml
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300
  free:
    type: file
    path: /etc/nikki/run/providers/free-proxies.yml
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

proxy-groups:

  # ── WAN ────────────────────────────────────────
  - name: WAN
    type: select
    proxies:
      - DIRECT
      - WAN2

  - name: WAN-AUTO
    type: load-balance
    proxies:
      - DIRECT
      - WAN2
    url: http://www.gstatic.com/generate_204
    interval: 300

  # ── PUBLIC PROXY ───────────────────────────────
  - name: PROXY-1010
    type: select
    proxies:
      - WAN2
      - DIRECT
      - WAN-AUTO
      - PROXY-FREE
      - PROXY-ID
      - PROXY-SG
      - PROXY-US
      - PROXY-ASIA
      - PROXY-EU
      - PROXY-WARP

  - name: PROXY-1011
    type: select
    proxies:
      - PROXY-FREE
      - PROXY-ID
      - PROXY-SG
      - PROXY-US
      - PROXY-ASIA
      - PROXY-EU
      - WAN2
      - DIRECT
      - PROXY-WARP

  - name: PROXY-1012
    type: select
    proxies:
      - PROXY-ASIA
      - PROXY-ID
      - PROXY-SG
      - PROXY-FREE
      - PROXY-US
      - PROXY-EU
      - WAN2
      - DIRECT
      - PROXY-WARP

  - name: PROXY-1013
    type: select
    use:
      - warp
    proxies:
      - WARP-LB
      - DIRECT
      - PROXY-FREE
      - PROXY-ASIA

  # ── GLOBAL ─────────────────────────────────────
  - name: GLOBAL
    type: select
    proxies:
      - DIRECT
      - WAN2
      - WAN-AUTO
      - PROXY-FREE
      - PROXY-ID
      - PROXY-SG
      - PROXY-US
      - PROXY-ASIA
      - PROXY-EU
      - PROXY-WARP

  # ── PROXY POOLS ────────────────────────────────
  - name: PROXY-FREE
    type: url-test
    use:
      - free
    filter: "(?!.*(?:PROXY-|WARP-))"
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: PROXY-ID
    type: url-test
    use:
      - free
    filter: "^🇮🇩"
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: PROXY-SG
    type: url-test
    use:
      - free
    filter: "^🇸🇬"
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: PROXY-US
    type: url-test
    use:
      - free
    filter: "^🇺🇸"
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: PROXY-ASIA
    type: url-test
    use:
      - free
    filter: "^(?:🇮🇩|🇸🇬|🇲🇾|🇹🇭|🇻🇳|🇵🇭|🇯🇵|🇰🇷|🇹🇼|🇭🇰|🇮🇳)"
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: PROXY-EU
    type: url-test
    use:
      - free
    filter: "^(?:🇩🇪|🇫🇷|🇳🇱|🇬🇧|🇸🇪|🇳🇴|🇫🇮|🇩🇰|🇵🇱|🇨🇿|🇦🇹|🇨🇭|🇧🇪|🇪🇸|🇵🇹|🇮🇹)"
    url: http://www.gstatic.com/generate_204
    interval: 300

  # ── WARP ───────────────────────────────────────
  - name: WARP-LB
    type: load-balance
    use:
      - warp
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: PROXY-WARP
    type: select
    use:
      - warp
    proxies:
      - WARP-LB
      - DIRECT

  # ── ADBLOCK ────────────────────────────────────
  - name: BLOCKED
    type: select
    proxies:
      - REJECT
      - DIRECT
      - WAN2
      - WAN-AUTO
      - GLOBAL
      - PROXY-FREE
      - PROXY-ID
      - PROXY-SG
      - PROXY-US
      - PROXY-ASIA
      - PROXY-EU
      - PROXY-WARP

  # ── SERVICE ────────────────────────────────────
  - name: GOOGLE
    type: select
    proxies:
      - DIRECT
      - WAN2
      - WAN-AUTO
      - GLOBAL
      - PROXY-FREE
      - PROXY-ID
      - PROXY-SG
      - PROXY-US
      - PROXY-ASIA
      - PROXY-EU
      - PROXY-WARP

  - name: AI
    type: select
    proxies:
      - DIRECT
      - WAN2
      - WAN-AUTO
      - GLOBAL
      - PROXY-FREE
      - PROXY-ID
      - PROXY-SG
      - PROXY-US
      - PROXY-ASIA
      - PROXY-EU
      - PROXY-WARP

  - name: CHECK-IP
    type: select
    proxies:
      - DIRECT
      - WAN2
      - WAN-AUTO
      - GLOBAL
      - PROXY-FREE
      - PROXY-ID
      - PROXY-SG
      - PROXY-US
      - PROXY-ASIA
      - PROXY-EU
      - PROXY-WARP

  - name: SOCIAL
    type: select
    proxies:
      - DIRECT
      - WAN2
      - WAN-AUTO
      - GLOBAL
      - PROXY-FREE
      - PROXY-ID
      - PROXY-SG
      - PROXY-US
      - PROXY-ASIA
      - PROXY-EU
      - PROXY-WARP

rule-providers:
  # Service rules (local)
  private:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/rickicode/free-proxy-singbox/refs/heads/main/openwrt/rules/private.yml"
    path: ./ruleset/private.yml
    interval: 86400
  google:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/rickicode/free-proxy-singbox/refs/heads/main/openwrt/rules/google.yml"
    path: ./ruleset/google.yml
    interval: 86400
  ai:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/rickicode/free-proxy-singbox/refs/heads/main/openwrt/rules/ai.yml"
    path: ./ruleset/ai.yml
    interval: 86400
  check-ip:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/rickicode/free-proxy-singbox/refs/heads/main/openwrt/rules/check-ip.yml"
    path: ./ruleset/check-ip.yml
    interval: 86400
  social:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/rickicode/free-proxy-singbox/refs/heads/main/openwrt/rules/social.yml"
    path: ./ruleset/social.yml
    interval: 86400

rules:
  # Adblock
  - GEOSITE,category-ads-all,BLOCKED

  # Block STUN (WebRTC leak prevention)
  - DST-PORT,3478,BLOCKED
  - DST-PORT,5349,BLOCKED
  - DST-PORT,19302,BLOCKED
  - IP-CIDR,74.125.0.0/16,BLOCKED,no-resolve

  # IP check (before private to avoid GEOSITE,private catching check-ip domains)
  - RULE-SET,check-ip,CHECK-IP

  # Private & CN
  - RULE-SET,private,DIRECT

  # Google
  - RULE-SET,google,GOOGLE

  # AI
  - RULE-SET,ai,AI

  # Social
  - RULE-SET,social,SOCIAL

  # Social
  - RULE-SET,social,SOCIAL

  # Catch-all
  - MATCH,GLOBAL
